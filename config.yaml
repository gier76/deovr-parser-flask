name: "DeoVR Web Parser"
version: "1.0.1"
slug: "deovr_web_parser"
description: "Parses video URLs for DeoVR VR Player"
url: "https://github.com/gier76/deovr-webparser"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8080
panel_icon: mdi:vlc
panel_title: DeoVR Parser
options:
  log_level: info
schema:
  log_level: list(none|error|warn|info|debug|trace)?
ports:
  8080/tcp: 8080
